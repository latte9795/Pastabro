<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pastabro 선결제</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f5f4f0;--card:#fff;--text:#1a1a1a;--sub:#5c5c5c;--muted:#a0a0a0;
      --accent:#1a1a1a;--border:#e8e6e1;--blight:#f0eeea;
      --green:#1a6b3c;--gl:#e8f5ee;--red:#8b2020;--rl:#fdf0f0;
      --warm:#f9f8f5;
      --serif:'Cormorant Garamond',Georgia,serif;
      --sans:'Noto Sans KR',-apple-system,sans-serif;
      --R:16px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{font-family:var(--sans);background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}

    /* ── LOGIN ── */
    #LS{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
    .li{text-align:center;padding:24px}
    .ll{font-family:var(--serif);font-weight:300;margin-bottom:48px}
    .ll .lm{font-size:48px;letter-spacing:.01em;line-height:1}
    .ll .ln{width:40px;height:1px;background:var(--muted);margin:16px auto}
    .ll .ls{font-size:12px;letter-spacing:.25em;color:var(--sub);font-weight:400}
    .lb{font-size:13px;color:var(--sub);margin-bottom:20px;letter-spacing:.05em}
    .gb{display:inline-flex;align-items:center;gap:10px;padding:14px 36px;background:var(--card);border:1px solid var(--border);border-radius:999px;font-family:var(--sans);font-size:14px;font-weight:500;color:var(--text);cursor:pointer;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.04)}
    .gb:hover{box-shadow:0 4px 24px rgba(0,0,0,.06);transform:translateY(-1px)}
    .gb:active{transform:translateY(0)}
    .gb svg{width:18px;height:18px}
    .le{display:none;margin-top:18px;font-size:13px;color:var(--red);background:var(--rl);padding:10px 18px;border-radius:12px}
    .la{position:fixed;bottom:24px;font-family:var(--serif);font-size:11px;letter-spacing:.12em;color:var(--muted)}

    /* ── APP ── */
    #AP{display:none;height:100%}
    .shell{max-width:520px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}

    .hdr{background:var(--card);padding:14px 18px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .hb{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:.02em}
    .hr{display:flex;align-items:center;gap:8px}
    .hn{font-size:11px;color:var(--sub)}
    .ho{font-size:10px;color:var(--muted);background:none;border:1px solid var(--border);padding:3px 10px;border-radius:999px;cursor:pointer;font-family:var(--sans)}

    .sw{position:relative}
    .si{width:100%;padding:10px 14px 10px 36px;font-size:15px;border-radius:999px;border:1px solid var(--border);outline:none;background:var(--bg);font-family:var(--sans);transition:all .15s}
    .si:focus{border-color:var(--accent);background:var(--card);box-shadow:0 0 0 3px rgba(26,26,26,.06)}
    .sic{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}

    .tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border)}
    .tab{flex:1;padding:11px;font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--sans)}
    .tab.on{color:var(--text);border-bottom-color:var(--accent)}

    .stats{display:flex;gap:8px;padding:12px 16px 4px}
    .stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
    .stat-l{font-size:11px;color:var(--muted);margin-bottom:4px}
    .stat-v{font-family:var(--serif);font-size:20px;font-weight:600}

    .lst{padding:8px 16px 100px}
    .cu{background:var(--card);border:1px solid var(--border);border-radius:var(--R);padding:15px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .12s}
    .cu:active{transform:scale(.98);background:var(--warm)}
    .cn{font-size:15px;font-weight:600}
    .cs{font-size:12px;color:var(--sub);margin-top:2px}
    .cb{font-family:var(--serif);font-size:18px;font-weight:600;white-space:nowrap}
    .cb.pos{color:var(--green)}.cb.zero{color:var(--muted)}.cb.neg{color:var(--red)}

    .emp{text-align:center;padding:56px 20px;color:var(--muted);font-size:14px}
    .emp-i{font-size:40px;margin-bottom:14px;opacity:.6}

    .fab{position:fixed;bottom:24px;right:calc(50% - 240px);width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:28px;border:none;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:50}
    .fab:active{transform:scale(.9)}
    @media(max-width:520px){.fab{right:20px}}

    /* ── MODAL ── */
    .ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;align-items:flex-end;justify-content:center}
    .ov.show{display:flex}
    .sh{background:var(--card);width:100%;max-width:520px;max-height:94vh;border-radius:22px 22px 0 0;overflow-y:auto;animation:up .22s ease-out}
    @keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
    .sb{width:36px;height:4px;background:#d4d4d4;border-radius:2px;margin:10px auto 0}
    .shdr{padding:14px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
    .st{font-size:17px;font-weight:700}
    .sx{font-size:20px;background:none;border:none;cursor:pointer;color:var(--sub);padding:4px 8px}
    .sbd{padding:16px 20px 28px}

    .fg{margin-bottom:14px}
    .fl{font-size:12px;color:var(--sub);margin-bottom:5px;display:block}
    .fi{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:12px;font-size:15px;font-family:var(--sans);outline:none;background:var(--warm);transition:border-color .15s}
    .fi:focus{border-color:var(--accent);background:var(--card)}

    .bp{width:100%;padding:14px;border-radius:14px;border:none;font-size:15px;font-weight:700;background:var(--accent);color:#fff;cursor:pointer;font-family:var(--sans)}
    .bp:active{opacity:.8}
    .bd{width:100%;padding:12px;border-radius:14px;border:1px solid #e8c8c8;font-size:13px;font-weight:500;background:none;color:var(--red);cursor:pointer;font-family:var(--sans);margin-top:20px}

    /* ── DETAIL ── */
    .dbw{text-align:center;padding:28px 0 24px;border-bottom:1px solid var(--border);margin-bottom:20px}
    .dbl{font-size:12px;color:var(--sub);letter-spacing:.08em;margin-bottom:6px}
    .db{font-family:var(--serif);font-size:42px;font-weight:600;letter-spacing:-.02em}

    .da{display:flex;gap:10px;margin-bottom:20px}
    .dab{flex:1;padding:16px 12px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--sans);display:flex;flex-direction:column;align-items:center;gap:4px}
    .dab:active{transform:scale(.96)}
    .dab span{font-size:11px;font-weight:400}
    .dab-d{background:var(--gl);color:var(--green);border:1px solid #c2ddd0}
    .dab-u{background:var(--rl);color:var(--red);border:1px solid #e4cbcb}

    .tx{display:none;background:var(--bg);border-radius:var(--R);padding:18px;margin-bottom:20px}
    .tx.show{display:block}
    .txt{font-size:15px;font-weight:700;margin-bottom:14px}

    .aq{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .aqb{padding:7px 14px;border-radius:999px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans)}
    .aqb:active{background:var(--accent);color:#fff}

    .sgw{position:relative;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff}
    .sgc{width:100%;height:130px;display:block;touch-action:none;cursor:crosshair}
    .sgp{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:#ccc;pointer-events:none}
    .sgx{position:absolute;top:8px;right:8px;font-size:11px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--sub);font-family:var(--sans)}

    .hh{font-size:14px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
    .hi{display:flex;justify-content:space-between;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--blight)}
    .hi:last-child{border-bottom:none}
    .hl{flex:1}
    .hm{font-size:13px;font-weight:500}
    .hd{font-size:11px;color:var(--muted);margin-top:3px}
    .hby{font-size:10px;color:var(--muted)}
    .hsg{width:44px;height:28px;border:1px solid var(--border);border-radius:6px;margin-top:4px;object-fit:contain;cursor:pointer}
    .hr2{text-align:right}
    .ha{font-family:var(--serif);font-size:16px;font-weight:700}
    .ha.plus{color:var(--green)}.ha.minus{color:var(--red)}
    .haf{font-size:11px;color:var(--muted);margin-top:3px}

    .sgov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center;padding:20px}
    .sgov.show{display:flex}
    .sgov img{max-width:90%;max-height:50vh;background:#fff;border-radius:14px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}

    /* ── Settings ── */
    .setA{display:none;padding:16px}.setA.show{display:block}
    .seT{font-size:15px;font-weight:600;margin-bottom:6px}
    .seD{font-size:12px;color:var(--sub);margin-bottom:14px}
    .seE{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--warm);border-radius:12px;margin-bottom:6px;font-size:13px}
    .seE button{font-size:11px;border:1px solid var(--border);background:none;border-radius:8px;padding:3px 10px;cursor:pointer;color:var(--red);font-family:var(--sans)}
    .seR{display:flex;gap:8px;margin-top:12px}

    /* ── Toast ── */
    .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--accent);color:#fff;padding:10px 22px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:all .3s;z-index:500;pointer-events:none;font-family:var(--sans)}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:400px){.db{font-size:36px}.stat-v{font-size:17px}}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="LS">
  <div class="li">
    <div class="ll">
      <div class="lm">pasta bro</div>
      <div class="ln"></div>
      <div class="ls">PREPAYMENT LEDGER</div>
    </div>
    <div class="lb">선결제 장부</div>
    <button class="gb" id="gBtn">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google로 시작하기
    </button>
    <div class="le" id="lErr"></div>
  </div>
  <div class="la">Nohae-ro 59, Gangbuk-gu, Seoul</div>
</div>

<!-- APP -->
<div id="AP">
  <div class="shell">
    <div class="hdr">
      <div class="ht">
        <div class="hb">pasta bro</div>
        <div class="hr"><span class="hn" id="uN"></span><button class="ho" id="loBtn">로그아웃</button></div>
      </div>

      <div class="stat"><div class="stat-l">총 선결제 잔액</div><div class="stat-v" id="sB" style="color:var(--green)">₩0</div></div>
    </div>
    <div class="lst" id="lA">
      <div class="emp" id="eM"><div class="emp-i">📒</div><div>아직 등록된 손님이 없습니다<br><b>+</b> 버튼으로 추가하세요</div></div>

      <div id="eL"></div>
      <div class="seR">
        <input type="email" class="fi" id="nE" placeholder="이메일 입력" style="flex:1" />
        <button class="bp" id="aEB" style="width:auto;padding:11px 20px;font-size:13px">추가</button>
      </div>
    </div>
    <button class="fab" id="fab">+</button>
  </div>
</div>

<!-- ADD MODAL -->
<div class="ov" id="aOv">
  <div class="sh">
    <div class="sb"></div>
    <div class="shdr"><div class="st">새 손님 등록</div><button class="sx" id="aX">✕</button></div>
    <div class="sbd">
      <div class="fg"><label class="fl">이름 *</label><input type="text" class="fi" id="aN" placeholder="홍길동" /></div>
      <div class="fg"><label class="fl">연락처</label><input type="tel" class="fi" id="aP" placeholder="010-0000-0000" /></div>
      <div class="fg"><label class="fl">메모</label><input type="text" class="fi" id="aM" placeholder="단골, 알레르기 등" /></div>
      <button class="bp" id="aS">등록하기</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="ov" id="dOv">
  <div class="sh">
    <div class="sb"></div>
    <div class="shdr"><div class="st" id="dN">—</div><button class="sx" id="dX">✕</button></div>
    <div class="sbd">
      <div id="dP" style="font-size:13px;color:var(--sub)"></div>
      <div id="dM" style="font-size:12px;color:var(--muted);margin-top:2px"></div>
      <div class="dbw">
        <div class="dbl">선결제 잔액</div>
        <div class="db" id="dB">₩0</div>
      </div>
      <div class="da">
        <button class="dab dab-d" id="bD">＋ 충전<span>선결제 입금</span></button>
        <button class="dab dab-u" id="bU">－ 사용<span>식사 차감</span></button>
      </div>
      <div class="tx" id="tB">
        <div class="txt" id="tT">충전</div>
        <div class="fg">
          <label class="fl">금액 (원)</label>
          <div class="aq">
            <button class="aqb" data-v="5000">5천</button>
            <button class="aqb" data-v="10000">1만</button>
            <button class="aqb" data-v="30000">3만</button>
            <button class="aqb" data-v="50000">5만</button>
            <button class="aqb" data-v="100000">10만</button>
          </div>
          <input type="number" class="fi" id="tA" placeholder="직접 입력" inputmode="numeric" />
        </div>
        <div class="fg"><label class="fl">메모</label><input type="text" class="fi" id="tM" placeholder="파스타 2인분 등" /></div>

          <label class="fl">손님 서명 (선택)</label>
          <div class="sgw"><canvas class="sgc" id="sgC"></canvas><span class="sgp" id="sgP">여기에 서명하세요</span><button class="sgx" id="sgX">지우기</button></div>
        </div>
        <button class="bp" id="tS">확인</button>
      </div>
      <div class="hh">📋 거래 내역</div>
      <div id="dH"></div>
      <button class="bd" id="delC" style="display:none;font-size:11px;margin-top:32px;opacity:0.5">이 손님 삭제</button>
    </div>
  </div>
</div>

<!-- Sig Overlay -->
<div class="sgov" id="sgOv"><img id="sgOI" src="" /></div>
<!-- Toast -->

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const FC={apiKey:"AIzaSyArHG7EbxhV5cIIixOcY9y162svZXx7ffA",authDomain:"pastabro-4e5b0.firebaseapp.com",projectId:"pastabro-4e5b0",storageBucket:"pastabro-4e5b0.firebasestorage.app",messagingSenderId:"614383037631",appId:"1:614383037631:web:7ec4593968f5832cb3aa0a"};
const ADMINS=["kju80259795@gmail.com","kimjungnam8722@gmail.com"];
const DE=[...ADMINS];

firebase.initializeApp(FC);
const au=firebase.auth(),db=firebase.firestore(),gP=new firebase.auth.GoogleAuthProvider();
const $=id=>document.getElementById(id);
let cId=null,cTy=null,al=[...DE],allC=[],isAdmin=false;

// Auth
$("gBtn").addEventListener("click",()=>{
  // 인앱 브라우저 감지 (카카오, 인스타 등)
  const ua=navigator.userAgent||"";
  const inApp=/KAKAOTALK|Instagram|FBAN|FBAV|NAVER|Line/i.test(ua);
  if(inApp){$("lErr").textContent="카카오/인스타 브라우저에서는 로그인이 안 됩니다. 오른쪽 ⋯ 메뉴에서 '크롬에서 열기'를 눌러주세요.";$("lErr").style.display="block";return}
  au.signInWithPopup(gP).catch(e=>{$("lErr").textContent="로그인 실패: "+e.message;$("lErr").style.display="block"});
});
$("loBtn").addEventListener("click",()=>au.signOut());
au.onAuthStateChanged(u=>{
  if(!u){$("LS").style.display="flex";$("AP").style.display="none";return}
  isAdmin=ADMINS.includes(u.email);
  db.collection("settings").doc("allowed_emails").get().then(d=>{
    if(d.exists&&d.data().list)al=d.data().list;
    // 관리자는 무조건 허용, 일반 직원은 목록 확인
    if(!isAdmin&&!al.includes(u.email)){$("lErr").textContent="접근 권한이 없습니다 ("+u.email+")";$("lErr").style.display="block";au.signOut();return}
    $("LS").style.display="none";$("AP").style.display="block";
    $("uN").textContent=u.displayName||u.email;
    document.querySelector('[data-t="set"]').style.display=isAdmin?"block":"none";
    loadC();if(isAdmin)loadE();
  });
});

function toast(m){$("tst").textContent=m;$("tst").classList.add("show");setTimeout(()=>$("tst").classList.remove("show"),2000)}

// Tabs
document.querySelectorAll(".tab").forEach(t=>{t.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("on"));t.classList.add("on");
  const v=t.dataset.t;
  $("lA").style.display=v==="list"?"block":"none";
  $("sA").className=v==="set"?"setA show":"setA";
  $("stW").style.display=v==="list"?"flex":"none";
  $("fab").style.display=v==="list"?"flex":"none";
})});

// Customers
function loadC(){
  db.collection("customers").orderBy("name").onSnapshot(s=>{
    allC=[];s.forEach(d=>allC.push({id:d.id,...d.data()}));render();
  });
}
function render(){
  const kw=$("sI").value.trim();
  const ls=kw?allC.filter(c=>c.name.includes(kw)||(c.phone||"").includes(kw)):allC;
  $("cL").innerHTML="";
  $("eM").style.display=ls.length===0?"block":"none";
  let tot=0;allC.forEach(c=>tot+=(c.balance||0));
  $("sT").textContent=allC.length;
  $("sB").textContent="₩"+tot.toLocaleString();
  ls.forEach(c=>{
    const d=document.createElement("div");d.className="cu";
    const b=c.balance||0,cl=b>0?"pos":b<0?"neg":"zero";
    d.innerHTML=`<div><div class="cn">${c.name}</div><div class="cs">${c.phone||""} ${c.memo?"· "+c.memo:""}</div></div><div class="cb ${cl}">₩${b.toLocaleString()}</div>`;
    d.addEventListener("click",()=>openD(c.id));$("cL").appendChild(d);
  });
}
$("sI").addEventListener("input",render);

// Add
$("fab").addEventListener("click",()=>$("aOv").classList.add("show"));
$("aX").addEventListener("click",()=>$("aOv").classList.remove("show"));
$("aOv").addEventListener("click",e=>{if(e.target===$("aOv"))$("aOv").classList.remove("show")});
$("aS").addEventListener("click",()=>{
  const n=$("aN").value.trim();if(!n){toast("이름을 입력하세요");return}
  db.collection("customers").add({name:n,phone:$("aP").value.trim(),memo:$("aM").value.trim(),balance:0,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).then(()=>{
    toast(n+"님 등록 완료");$("aN").value="";$("aP").value="";$("aM").value="";$("aOv").classList.remove("show");
  });
});

// Detail
function openD(id){
  cId=id;$("dOv").classList.add("show");$("tB").classList.remove("show");
  $("delC").style.display=isAdmin?"block":"none";
  db.collection("customers").doc(id).get().then(d=>{
    const c=d.data();$("dN").textContent=c.name;$("dP").textContent=c.phone||"";$("dM").textContent=c.memo||"";
    const b=c.balance||0;$("dB").textContent="₩"+b.toLocaleString();
    $("dB").style.color=b>0?"var(--green)":b<0?"var(--red)":"var(--muted)";
  });
  loadH(id);
}
function closeD(){$("dOv").classList.remove("show");cId=null}
$("dX").addEventListener("click",closeD);
$("dOv").addEventListener("click",e=>{if(e.target===$("dOv"))closeD()});

$("bD").addEventListener("click",()=>openTx("deposit"));
$("bU").addEventListener("click",()=>openTx("withdraw"));
function openTx(t){cTy=t;$("tT").textContent=t==="deposit"?"＋ 충전":"－ 사용";$("tB").classList.add("show");$("tA").value="";$("tM").value="";$("tD").value="";clrSig()}

document.querySelectorAll(".aqb").forEach(b=>{b.addEventListener("click",()=>$("tA").value=b.dataset.v)});

$("tS").addEventListener("click",()=>{
  const amt=parseInt($("tA").value);if(!amt||amt<=0){toast("금액을 입력하세요");return}
  const sig=getSig(),memo=$("tM").value.trim(),delta=cTy==="deposit"?amt:-amt;
  const customDate=$("tD").value;
  const ts=customDate?firebase.firestore.Timestamp.fromDate(new Date(customDate)):firebase.firestore.FieldValue.serverTimestamp();
  const ref=db.collection("customers").doc(cId);
  db.runTransaction(tx=>{
    return tx.get(ref).then(doc=>{
      const nb=(doc.data().balance||0)+delta;
      tx.update(ref,{balance:nb});
      tx.set(ref.collection("transactions").doc(),{type:cTy,amount:amt,delta,memo,signature:sig||null,balanceAfter:nb,createdAt:ts,createdBy:au.currentUser.email});
    });
  }).then(()=>{toast(cTy==="deposit"?"충전 완료 ✓":"사용 처리 완료 ✓");$("tB").classList.remove("show");openD(cId)});
});

function loadH(id){
  db.collection("customers").doc(id).collection("transactions").orderBy("createdAt","desc").limit(50).get().then(s=>{
    const h=$("dH");h.innerHTML="";
    if(s.empty){h.innerHTML='<div style="font-size:13px;color:var(--muted);padding:14px 0">거래 내역이 없습니다</div>';return}
    s.forEach(d=>{
      const t=d.data(),div=document.createElement("div");div.className="hi";
      const p=t.delta>0,dt=t.createdAt?new Date(t.createdAt.toDate()).toLocaleString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"";
      div.innerHTML=`<div class="hl"><div class="hm">${t.memo||(p?"충전":"사용")}</div><div class="hd">${dt}</div><div class="hby">${t.createdBy||""}</div>${t.signature?'<img class="hsg" src="'+t.signature+'" onclick="showSig(this.src)" />':""}</div><div class="hr2"><div class="ha ${p?'plus':'minus'}">${p?'+':''}₩${t.delta.toLocaleString()}</div><div class="haf">잔액 ₩${(t.balanceAfter||0).toLocaleString()}</div></div>`;
      h.appendChild(div);
    });
  });
}

$("delC").addEventListener("click",()=>{
  const name=$("dN").textContent;
  const typed=prompt("정말 삭제하려면 손님 이름을 정확히 입력하세요:\n\n"+name);
  if(typed!==name){toast("이름이 일치하지 않습니다");return}
  // 백업 후 삭제
  const ref=db.collection("customers").doc(cId);
  ref.get().then(doc=>{
    const data=doc.data();
    return ref.collection("transactions").orderBy("createdAt","desc").get().then(snap=>{
      const txs=[];snap.forEach(d=>txs.push(d.data()));
      return db.collection("deleted_customers").add({...data,transactions:txs,deletedAt:firebase.firestore.FieldValue.serverTimestamp(),deletedBy:au.currentUser.email});
    });
  }).then(()=>ref.delete()).then(()=>{toast("삭제 완료 (백업 저장됨)");closeD()});
});

// Signature
const cv=$("sgC"),cx=cv.getContext("2d");let dr=false,hs=false;
function rsCv(){const r=cv.parentElement.getBoundingClientRect();cv.width=r.width;cv.height=130;cx.strokeStyle="#1a1a1a";cx.lineWidth=2;cx.lineCap="round";cx.lineJoin="round"}
function gp(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
cv.addEventListener("pointerdown",e=>{dr=true;hs=true;$("sgP").style.display="none";const p=gp(e);cx.beginPath();cx.moveTo(p.x,p.y)});
cv.addEventListener("pointermove",e=>{if(!dr)return;const p=gp(e);cx.lineTo(p.x,p.y);cx.stroke()});
cv.addEventListener("pointerup",()=>dr=false);
cv.addEventListener("pointerleave",()=>dr=false);
function clrSig(){rsCv();hs=false;$("sgP").style.display="block"}
function getSig(){return hs?cv.toDataURL("image/png"):null}
$("sgX").addEventListener("click",clrSig);
const ob=new MutationObserver(()=>{if($("tB").classList.contains("show"))setTimeout(rsCv,50)});
ob.observe($("tB"),{attributes:true,attributeFilter:["class"]});

window.showSig=function(s){$("sgOI").src=s;$("sgOv").classList.add("show")};
$("sgOv").addEventListener("click",()=>$("sgOv").classList.remove("show"));

// Emails
function loadE(){db.collection("settings").doc("allowed_emails").get().then(d=>{if(d.exists&&d.data().list)al=d.data().list;renE()})}
function renE(){const c=$("eL");c.innerHTML="";al.forEach((em,i)=>{const d=document.createElement("div");d.className="seE";d.innerHTML=`<span>${em}</span><button onclick="rmE(${i})">삭제</button>`;c.appendChild(d)})}
$("aEB").addEventListener("click",()=>{const em=$("nE").value.trim().toLowerCase();if(!em||!em.includes("@")){toast("올바른 이메일 입력");return}if(al.includes(em)){toast("이미 등록됨");return}al.push(em);savE();$("nE").value=""});
window.rmE=function(i){if(al.length<=1){toast("최소 1명 필요");return}if(!confirm(al[i]+" 삭제?"))return;al.splice(i,1);savE()};
function savE(){db.collection("settings").doc("allowed_emails").set({list:al}).then(()=>{renE();toast("저장 ✓")})}

// PWA
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{})}
</script>
</body>
</html>
