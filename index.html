  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
    }

    .app {
      background: #ffffff;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 16px 14px 10px;
      border-radius: 0;
      box-shadow: none;
    }

    .app-inner {
      margin-top: 10px;
    }

    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .icon-badge {
      width: 40px;
      height: 40px;
      border-radius: 14px;
      background: #eef3ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }
    .app-title {
      font-size: 19px;
      font-weight: 700;
      color: #111827;
    }
    .app-subtitle {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }

    .search-box-wrapper {
      position: relative;
      margin-bottom: 10px;
      margin-top: 8px;
    }
    .search-label {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .search-input {
      width: 100%;
      padding: 11px 40px 11px 38px;
      font-size: 16px; 
      border-radius: 999px;
      border: 1px solid #d1d5db;
      outline: none;
      background-color: #f9fafb;
      transition: all 0.15s ease;
    }
    .search-input:focus {
      border-color: #4f46e5;
      background-color: #ffffff;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      color: #9ca3af;
      pointer-events: none;
    }
    .clear-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      border: none;
      background: #e5e7eb;
      color: #374151;
      cursor: pointer;
      display: none;
    }
    .clear-btn.show {
      display: inline-block;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 6px;
      gap: 6px;
    }
    .summary-row div:first-child {
      flex: 1;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
    }

    .result-box {
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 8px 8px 4px;
      min-height: 60px;
      max-height: calc(100vh - 220px); 
      overflow-y: auto;
    }

    .result-empty {
      font-size: 13px;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 2px 8px;
    }

    .result-item {
      padding: 8px 9px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      margin-bottom: 5px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }
    .result-item.highlight {
      border-color: #4f46e5;
      box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.35);
    }
    .result-name {
      font-size: 14px;
      font-weight: 600;
      color: #111827;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .result-name-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4f46e5;
    }
    .result-detail {
      font-size: 12px;
      color: #4b5563;
    }

    .footer {
      margin-top: 8px;
      text-align: right;
      font-size: 10px;
      color: #9ca3af;
    }

    
    @media (max-width: 480px) {
      .app {
        padding: 14px 10px 8px;
      }
      .app-title {
        font-size: 18px;
      }
      .app-subtitle {
        font-size: 11px;
      }
      .search-input {
        font-size: 16px;
      }
      .result-name {
        font-size: 14px;
      }
      .result-detail {
        font-size: 12px;
      }
    }
/* 🔐 Lock Screen */
#lockScreen {
  position: fixed;
  inset: 0;
  background: #f3f4f6;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  z-index: 9999;
}

.lock-card {
  width: 100%;
  max-width: 340px;
  background: #ffffff;
  border-radius: 18px;
  padding: 22px 18px 18px;
  box-shadow: 0 14px 40px rgba(0,0,0,0.10);
  border: 1px solid #e5e7eb;
}

.lock-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}

.lock-icon {
  width: 44px;
  height: 44px;
  border-radius: 16px;
  background: #eef2ff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.lock-title {
  font-size: 16px;
  font-weight: 800;
  color: #111827;
  line-height: 1.1;
}

.lock-sub {
  font-size: 12px;
  color: #6b7280;
  margin-top: 2px;
}

.lock-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 999px;
  border: 1px solid #d1d5db;
  font-size: 15px;
  outline: none;
  background: #f9fafb;
}

.lock-input:focus {
  border-color: #4f46e5;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
}

.lock-btn {
  width: 100%;
  margin-top: 10px;
  padding: 12px 14px;
  border-radius: 999px;
  border: none;
  background: #4f46e5;
  color: #ffffff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
}

.lock-btn:active {
  transform: translateY(1px);
}

.lock-error {
  display: none;
  margin-top: 10px;
  font-size: 12px;
  color: #dc2626;
}

.lock-hint {
  margin-top: 10px;
  font-size: 11px;
  color: #9ca3af;
  text-align: right;
}

  </style>

<body>
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-head">
      <div class="lock-icon">🔒</div>
      <div>
        <div class="lock-title">손님 장부 검색</div>
        <div class="lock-sub">비밀번호를 입력하세요</div>
      </div>
    </div>

    <input
      id="passwordInput"
      class="lock-input"
      type="password"
      inputmode="numeric"
      placeholder="비밀번호"
      autocomplete="off"
    />

    <button id="unlockBtn" class="lock-btn">확인</button>

    <div id="lockError" class="lock-error">비밀번호가 올바르지 않습니다.</div>
    <div class="lock-hint">생일</div>
  </div>
</div>

  <div class="app">
    <div class="app-inner">
      <div class="app-header">
        <div class="icon-badge">📒</div>
        <div>
          <div class="app-title">손님 장부 검색</div>
          <div class="app-subtitle">이름을 입력하면 어느 장부, 몇 페이지인지 바로 확인</div>
        </div>
      </div>

      <div class="search-box-wrapper">
        <div class="search-label">손님 이름</div>
        <span class="search-icon">🔍</span>
        <input
          id="searchInput"
          type="text"
          class="search-input"
          placeholder="예) 김철수, 이영희"
          autocomplete="off"
        />
        <button id="clearBtn" class="clear-btn">지우기</button>
      </div>

      <div class="summary-row">
        <div>입력한 이름과 <b>포함되는</b> 모든 손님이 표시됩니다.</div>
        <div class="chip">
          📚 <span id="totalCountText">총 0명 등록</span>
        </div>
      </div>

      <div class="result-box" id="resultBox">
        <div class="result-empty">
          🔎 위에 이름을 입력하면 결과가 여기 표시됩니다.
        </div>
      </div>

      <div class="footer">
        검색 결과 클릭 없이 바로 확인 가능
      </div>
    </div>
  </div>

  <script>
// 🔐 Lock
const PASSWORD = "0000"; // 

const lockScreen = document.getElementById("lockScreen");
const passwordInput = document.getElementById("passwordInput");
const unlockBtn = document.getElementById("unlockBtn");
const lockError = document.getElementById("lockError");


document.body.style.overflow = "hidden";

function unlock() {
  if ((passwordInput.value || "").trim() === PASSWORD) {
    lockScreen.style.display = "none";
    document.body.style.overflow = "";
  } else {
    lockError.style.display = "block";
    passwordInput.value = "";
    passwordInput.focus();
  }
}

unlockBtn.addEventListener("click", unlock);
passwordInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") unlock();
});

// 페이지 열리면 자동 포커스
window.addEventListener("load", () => {
  passwordInput.focus();
});

    const input = document.getElementById("searchInput");
    const resultBox = document.getElementById("resultBox");
    const clearBtn = document.getElementById("clearBtn");
    const totalCountText = document.getElementById("totalCountText");

    
    totalCountText.textContent = `총 ${data.length}명 등록`;

    function renderResults(keyword) {
      resultBox.innerHTML = "";

      const trimmed = keyword.trim();

      if (!trimmed) {
        resultBox.innerHTML = `
          <div class="result-empty">
            🔎 위에 이름을 입력하면 결과가 여기 표시됩니다.
          </div>
        `;
        return;
      }

      const results = data.filter(item => item.name.includes(trimmed));

      if (results.length === 0) {
        resultBox.innerHTML = `
          <div class="result-empty">
            ⚠️ "<b>${trimmed}</b>"(으)로 등록된 손님이 없습니다.
          </div>
        `;
        return;
      }

      results.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "result-item" + (index === 0 ? " highlight" : "");
        div.innerHTML = `
          <div class="result-name">
            ${item.name}
            <span class="result-name-badge">${index === 0 ? "가장 일치" : "포함"}</span>
          </div>
          <div class="result-detail">
            장부 <b>${item.book}</b> · <b>${item.page}</b>
          </div>
        `;
        resultBox.appendChild(div);
      });
    }

    input.addEventListener("input", () => {
      const value = input.value;
      clearBtn.classList.toggle("show", value.length > 0);
      renderResults(value);
    });

    clearBtn.addEventListener("click", () => {
      input.value = "";
      clearBtn.classList.remove("show");
      input.focus();
      renderResults("");
    });

    
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
      }
    });
  </script>
